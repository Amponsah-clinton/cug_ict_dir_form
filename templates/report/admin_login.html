<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — CUG Archival System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      background: #0f172a;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      flex-shrink: 0;
    }
    .topbar-brand {
      color: #f1f5f9;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .topbar-brand span { color: #93c5fd; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 44px 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    /* ── Card header ── */
    .card-icon {
      width: 48px;
      height: 48px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .card h1 {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .card .subtitle {
      font-size: 13.5px;
      color: #64748b;
      margin-bottom: 32px;
    }

    /* ── Error banner ── */
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13.5px;
      color: #991b1b;
      margin-bottom: 22px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .error-msg .err-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; }

    /* ── Form fields ── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 42px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.18);
    }

    input.invalid {
      border-color: #f87171;
    }
    input.invalid:focus {
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.18);
    }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      height: 44px;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn-submit:hover   { background: #1e293b; }
    .btn-submit:active  { background: #0a1020; }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Footer note ── */
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #f1f5f9;
      font-size: 12.5px;
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Page footer ── */
    .page-footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #94a3b8;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    CUG Archival System &nbsp;/&nbsp; <span>Admin</span>
  </div>
</div>

<main>
  <div class="card">
    <div class="card-icon">&#128274;</div>
    <h1>Admin Sign In</h1>
    <p class="subtitle">Metascholar Consult Ltd — Restricted Area</p>

    {% if error %}
    <div class="error-msg">
      <span class="err-icon">&#9888;</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="{% url 'admin_login' %}" novalidate id="login-form">
      {% csrf_token %}

      <div class="field">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
          {% if error %}class="invalid"{% endif %}
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••••"
          autocomplete="current-password"
          required
          {% if error %}class="invalid"{% endif %}
        />
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">
        <span id="btn-text">Sign In</span>
      </button>
    </form>

    <div class="card-footer">
      Access is restricted to authorised administrators only.<br>
      Catholic University of Ghana &mdash; UDTS
    </div>
  </div>
</main>

<div class="page-footer">
  &copy; 2026 Metascholar Consult Ltd. All rights reserved.
</div>

<script>
  // Focus first field on load
  document.getElementById('email').focus();

  // Show loading state on submit
  document.getElementById('login-form').addEventListener('submit', function () {
    const btn  = document.getElementById('btn-submit');
    const text = document.getElementById('btn-text');
    btn.disabled = true;
    text.textContent = 'Signing in…';
  });
</script>
</body>
</html>
